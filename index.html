<!DOCTYPE html>
<html>
<head><title>战略调研报告生成器</title><meta charset="UTF-8"></head>
<body style="padding:50px; font-family:sans-serif;">
    <h2>战略调研报告生成器</h2>
    <input type="text" id="topic" placeholder="输入调研主题" style="width:300px; padding:10px;">
    <button onclick="generate()" style="padding:10px 20px; background:blue; color:white; border:none; cursor:pointer;">生成报告</button>
    <div id="output" style="margin-top:20px; border:1px solid #ccc; padding:20px; min-height:100px; white-space:pre-wrap;">报告将在这里显示...</div>

    <script>
    async function generate() {
        const topic = document.getElementById('topic').value;
        const out = document.getElementById('output');
        if(!topic) return alert('请输入主题');
        out.innerHTML = "正在努力生成中，请耐心等待...";

        try {
            // 关键：必须带上 /api/
            const res = await fetch('/api/generate-report', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({topic: topic})
            });
            
            const contentType = res.headers.get('content-type');
            if(!contentType || !contentType.includes('application/json')) {
                const text = await res.text();
                out.innerHTML = "<span style='color:red'>错误：服务器返回了网页而非数据。这说明 Vercel 路由配置还没生效。详情：" + text.slice(0,100) + "</span>";
                return;
            }

            const data = await res.json();
            out.innerText = data.report || data.error;
        } catch(e) {
            out.innerHTML = "<span style='color:red'>连接失败：" + e.message + "</span>";
        }
    }
    </script>
</body>
</html>
